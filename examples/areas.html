<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>watercolorviz — Phase 2 area charts</title>
    <script type="importmap">
      { "imports": { "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm" } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: #e9e4d8;
        color: #2c2a25;
        font-family: 'Caveat', system-ui, sans-serif;
        padding: 28px;
      }
      h1 { font-size: 26px; margin: 0 0 16px; }
      .grid { display: flex; flex-wrap: wrap; gap: 24px; }
      canvas { box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18); border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>🎨 watercolorviz — Phase 2 (arbitrary filled polygons)</h1>
    <div class="grid">
      <canvas id="ridge"></canvas>
      <canvas id="area"></canvas>
      <canvas id="timearea"></canvas>
      <canvas id="stacked"></canvas>
      <canvas id="stream"></canvas>
    </div>

    <script type="module">
      const { Area, Ridgeline, StackedArea } = await import('../src/index.js');

      if (document.fonts && document.fonts.ready) {
        try {
          await document.fonts.load('22px Caveat');
          await document.fonts.ready;
        } catch (e) {
          /* fall back */
        }
      }

      const MUTED = ['#dc8068', '#e8b94f', '#94a854', '#5fa3a0', '#6f93c2'];

      // Ridgeline (headline).
      const rx = Array.from({ length: 50 }, (_, i) => i);
      const gauss = (c, w) => rx.map((i) => Math.exp(-((i - c) ** 2) / (2 * w * w)));
      const series = [gauss(12, 6), gauss(20, 7), gauss(28, 5), gauss(34, 8), gauss(40, 6)].map(
        (s, k) => s.map((v) => v * (0.7 + 0.3 * Math.sin(k))),
      );
      new Ridgeline('#ridge', {
        title: 'Ridgeline',
        data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'], x: rx, series },
        colors: MUTED,
        seed: 3,
        height: 360,
      });

      // Area.
      const ax = Array.from({ length: 24 }, (_, i) => i);
      const ay = ax.map((i) => 30 + 22 * Math.sin(i / 3.2) + 10 * Math.sin(i / 1.3) + 14);
      new Area('#area', { title: 'Area', data: { x: ax, y: ay }, color: '#6f93c2', seed: 7 });

      // Time-axis area: Date x-values get formatted date ticks automatically.
      const months = Array.from({ length: 12 }, (_, i) => new Date(2025, i, 1));
      new Area('#timearea', {
        title: 'Area — time axis',
        data: { x: months, y: [20, 24, 22, 30, 28, 35, 40, 38, 33, 29, 26, 31] },
        color: '#94a854', seed: 5, yLabel: 'k$',
      });

      // Stacked area + streamgraph.
      const sx = Array.from({ length: 30 }, (_, i) => i);
      const wave = (c, w, a) => sx.map((i) => a * Math.exp(-((i - c) ** 2) / (2 * w * w)) + a * 0.15);
      const sData = {
        x: sx,
        series: { Alpha: wave(8, 7, 20), Beta: wave(16, 6, 26), Gamma: wave(20, 9, 18), Delta: wave(24, 6, 22) },
      };
      // Stacked area: a few distinct hues + a legend.
      new StackedArea('#stacked', { title: 'Stacked Area', data: sData, colors: MUTED, seed: 2 });

      // Streamgraph: a viridis-style SEQUENTIAL palette with crisp dark boundary
      // lines so each band reads clearly (the default). Capped at maxSeries (8);
      // extras collapse into "Other". Pass a single `color` for a one-hue ramp,
      // or `separator: '#fff'` for the soft white-line look.
      const bx = Array.from({ length: 44 }, (_, i) => i);
      let s = 13;
      const rnd = () => (s = (s * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
      const stream = {};
      for (let k = 0; k < 8; k++) {
        let v = 0.6 + rnd();
        stream['s' + k] = bx.map((_, i) => {
          v = Math.max(0.15, v + (rnd() - 0.5) * 0.9);
          return v + 0.4 * Math.sin(i / 3 + k);
        });
      }
      new StackedArea('#stream', { title: 'Streamgraph', stream: true, data: { x: bx, series: stream }, seed: 4 });
    </script>
  </body>
</html>
